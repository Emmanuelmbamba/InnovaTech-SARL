<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPTech SARL - Inscription</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
:root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --secondary: #1e293b;
    --success: #10b981;
    --error: #ef4444;
    --glass: rgba(255,255,255,0.05);
    --text: #ffffff;
    --text-muted: #94a3b8;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    padding: 20px 0;
}

.register-container {
    width: 100%;
    max-width: 500px;
    padding: 20px;
}

.register-card {
    background: var(--glass);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
}

.logo-section {
    text-align: center;
    margin-bottom: 30px;
}

.logo-section img {
    height: 60px;
    margin-bottom: 15px;
}

.logo-section h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
}

.logo-section p {
    color: var(--text-muted);
    font-size: 14px;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: var(--text);
    font-size: 14px;
}

.input-wrapper {
    position: relative;
}

.input-wrapper .material-icons {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 20px;
}

.form-control {
    width: 100%;
    padding: 15px 15px 15px 45px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    transition: all 0.3s ease;
}

.form-control:focus {
    outline: none;
    border-color: var(--primary);
    background: rgba(255,255,255,0.08);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
}

.form-control::placeholder {
    color: var(--text-muted);
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.btn-register {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 10px;
}

.btn-register:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(37,99,235,0.3);
}

.btn-register:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

.divider {
    text-align: center;
    margin: 30px 0;
    position: relative;
}

.divider::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: rgba(255,255,255,0.1);
}

.divider span {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    padding: 0 20px;
    color: var(--text-muted);
    font-size: 14px;
}

.login-link {
    text-align: center;
    margin-top: 25px;
}

.login-link p {
    color: var(--text-muted);
    font-size: 14px;
}

.login-link a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s ease;
}

.login-link a:hover {
    color: var(--primary-dark);
}

.alert {
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 20px;
    display: none;
    align-items: center;
    gap: 10px;
    font-size: 14px;
}

.alert-success {
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.3);
    color: var(--success);
}

.alert-error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--error);
}

.loading {
    display: none;
    text-align: center;
    margin-top: 15px;
}

.spinner {
    border: 3px solid rgba(255,255,255,0.1);
    border-top: 3px solid var(--primary);
    border-radius: 50%;
    width: 20px;
    height: 20px;
    animation: spin 1s linear infinite;
    display: inline-block;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.password-strength {
    margin-top: 8px;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
}

.password-strength-bar {
    height: 100%;
    width: 0;
    transition: all 0.3s ease;
    border-radius: 2px;
}

.strength-weak { background: var(--error); width: 33%; }
.strength-medium { background: #f59e0b; width: 66%; }
.strength-strong { background: var(--success); width: 100%; }

.terms-checkbox {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 20px;
}

.terms-checkbox input[type="checkbox"] {
    margin-top: 2px;
    width: 18px;
    height: 18px;
    accent-color: var(--primary);
}

.terms-checkbox label {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.4;
}

.terms-checkbox a {
    color: var(--primary);
    text-decoration: none;
}

@media (max-width: 480px) {
    .register-card {
        padding: 30px 20px;
    }
    
    .form-row {
        grid-template-columns: 1fr;
    }
    
    .logo-section h1 {
        font-size: 24px;
    }
}
</style>
</head>
<body>

<div class="register-container">
    <div class="register-card">
        <div class="logo-section">
            <img src="profilelogo2.jpg" alt="Logo CPTech">
            <h1>CPTech SARL</h1>
            <p>Créer votre compte</p>
        </div>

        <div class="alert alert-success" id="successAlert">
            <span class="material-icons">check_circle</span>
            <span>Compte créé avec succès ! Redirection...</span>
        </div>

        <div class="alert alert-error" id="errorAlert">
            <span class="material-icons">error</span>
            <span id="errorMessage">Erreur lors de l'inscription</span>
        </div>

        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="prenom">Prénom</label>
                    <div class="input-wrapper">
                        <span class="material-icons">person</span>
                        <input type="text" id="prenom" class="form-control" placeholder="Jean" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="nom">Nom</label>
                    <div class="input-wrapper">
                        <span class="material-icons">person</span>
                        <input type="text" id="nom" class="form-control" placeholder="Dupont" required>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-wrapper">
                    <span class="material-icons">email</span>
                    <input type="email" id="email" class="form-control" placeholder="jean.dupont@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="telephone">Téléphone</label>
                <div class="input-wrapper">
                    <span class="material-icons">phone</span>
                    <input type="tel" id="telephone" class="form-control" placeholder="+243 000 000 000" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <div class="input-wrapper">
                    <span class="material-icons">lock</span>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="password-strength">
                    <div class="password-strength-bar" id="strengthBar"></div>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmer le mot de passe</label>
                <div class="input-wrapper">
                    <span class="material-icons">lock</span>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <div class="form-group">
                <label for="formation">Formation souhaitée</label>
                <div class="input-wrapper">
                    <span class="material-icons">school</span>
                    <select id="formation" class="form-control" required>
                        <option value="">-- Sélectionner --</option>
                        <option value="dev-web">Développement Web & Applications</option>
                        <option value="admin-reseau">Administration Réseau & Télécom</option>
                        <option value="gestion-entreprises">Gestion des Entreprises Publiques</option>
                        <option value="base-donnees">Base de Données</option>
                        <option value="cybersecurite">Cybersécurité</option>
                        <option value="maintenance">Maintenance Informatique</option>
                    </select>
                </div>
            </div>

            <div class="terms-checkbox">
                <input type="checkbox" id="terms" required>
                <label for="terms">
                    J'accepte les <a href="#">conditions d'utilisation</a> et la <a href="#">politique de confidentialité</a>
                </label>
            </div>

            <button type="submit" class="btn-register" id="registerBtn">
                Créer mon compte
            </button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <span style="margin-left: 10px;">Création du compte...</span>
            </div>
        </form>

        <div class="divider">
            <span>OU</span>
        </div>

        <div class="login-link">
            <p>Déjà un compte ? <a href="login.html">Se connecter</a></p>
        </div>
    </div>
</div>

<script>
const registerForm = document.getElementById('registerForm');
const registerBtn = document.getElementById('registerBtn');
const loading = document.getElementById('loading');
const successAlert = document.getElementById('successAlert');
const errorAlert = document.getElementById('errorAlert');
const errorMessage = document.getElementById('errorMessage');
const passwordInput = document.getElementById('password');
const confirmPasswordInput = document.getElementById('confirmPassword');
const strengthBar = document.getElementById('strengthBar');

// Vérification de la force du mot de passe
passwordInput.addEventListener('input', function() {
    const password = this.value;
    let strength = 0;
    
    if (password.length >= 8) strength++;
    if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
    if (password.match(/[0-9]/)) strength++;
    if (password.match(/[^a-zA-Z0-9]/)) strength++;
    
    strengthBar.className = 'password-strength-bar';
    
    if (password.length > 0) {
        if (strength <= 1) {
            strengthBar.classList.add('strength-weak');
        } else if (strength === 2) {
            strengthBar.classList.add('strength-medium');
        } else {
            strengthBar.classList.add('strength-strong');
        }
    }
});

registerForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const prenom = document.getElementById('prenom').value.trim();
    const nom = document.getElementById('nom').value.trim();
    const email = document.getElementById('email').value.trim();
    const telephone = document.getElementById('telephone').value.trim();
    const password = passwordInput.value;
    const confirmPassword = confirmPasswordInput.value;
    const formation = document.getElementById('formation').value;
    const terms = document.getElementById('terms').checked;
    
    // Validation
    if (!prenom || !nom || !email || !telephone || !password || !confirmPassword || !formation) {
        showError('Veuillez remplir tous les champs');
        return;
    }
    
    if (password !== confirmPassword) {
        showError('Les mots de passe ne correspondent pas');
        return;
    }
    
    if (password.length < 8) {
        showError('Le mot de passe doit contenir au moins 8 caractères');
        return;
    }
    
    if (!terms) {
        showError('Veuillez accepter les conditions d\'utilisation');
        return;
    }
    
    // Loading state
    registerBtn.disabled = true;
    loading.style.display = 'block';
    hideAlerts();
    
    // Simulation d'une requête API
    await new Promise(resolve => setTimeout(resolve, 2000));
    
    // Récupérer les utilisateurs existants
    let users = JSON.parse(localStorage.getItem('cptech_users')) || [];
    
    // Vérifier si l'email existe déjà
    if (users.find(u => u.email === email)) {
        showError('Cet email est déjà utilisé');
        registerBtn.disabled = false;
        loading.style.display = 'none';
        return;
    }
    
    // Créer le nouvel utilisateur
    const newUser = {
        id: Date.now(),
        prenom,
        nom,
        email,
        telephone,
        password,
        formation,
        role: 'user',
        createdAt: new Date().toISOString()
    };
    
    users.push(newUser);
    localStorage.setItem('cptech_users', JSON.stringify(users));
    
    // Afficher le succès
    showSuccess();
    
    // Redirection vers la page de connexion
    setTimeout(() => {
        window.location.href = 'login.html';
    }, 2000);
});

function showSuccess() {
    successAlert.style.display = 'flex';
    errorAlert.style.display = 'none';
}

function showError(message) {
    errorMessage.textContent = message;
    errorAlert.style.display = 'flex';
    successAlert.style.display = 'none';
}

function hideAlerts() {
    successAlert.style.display = 'none';
    errorAlert.style.display = 'none';
}

// Vérifier si déjà connecté
window.addEventListener('load', function() {
    const session = JSON.parse(localStorage.getItem('cptech_session'));
    if (session && session.user) {
        window.location.href = 'login.html';
    }
});
</script>

</body>
</html>
